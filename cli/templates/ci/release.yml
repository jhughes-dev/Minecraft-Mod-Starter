name: Release {{mod_name}}
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type override'
        required: false
        type: choice
        options:
          - release
          - beta
          - alpha

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew build

      - name: Read gradle.properties
        id: props
        run: |
          echo "minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "version_type=$(grep '^version_type=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Determine version type
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_type }}" ]; then
            echo "type=${{ github.event.inputs.version_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=${{ steps.props.outputs.version_type }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean build artifacts
        run: |
{{#fabric}}
          rm -f fabric/build/libs/*-sources.jar fabric/build/libs/*-dev-shadow.jar
{{/fabric}}
{{#neoforge}}
          rm -f neoforge/build/libs/*-sources.jar neoforge/build/libs/*-dev-shadow.jar
{{/neoforge}}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelogs/${{ github.ref_name }}.md
          fail_on_unmatched_files: false
          files: |
{{#fabric}}
            fabric/build/libs/*.jar
{{/fabric}}
{{#neoforge}}
            neoforge/build/libs/*.jar
{{/neoforge}}

{{#fabric}}
      - name: Publish Fabric to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: {{modrinth_id}}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
{{#curseforge}}
          curseforge-id: {{curseforge_id}}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
{{/curseforge}}
          files: fabric/build/libs/!(*-@(dev-shadow|sources)).jar
          version-type: ${{ steps.version.outputs.type }}
          loaders: fabric
          game-versions: ${{ steps.props.outputs.minecraft_version }}

{{/fabric}}
{{#neoforge}}
      - name: Publish NeoForge to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: {{modrinth_id}}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
{{#curseforge}}
          curseforge-id: {{curseforge_id}}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
{{/curseforge}}
          files: neoforge/build/libs/!(*-@(dev-shadow|sources)).jar
          version-type: ${{ steps.version.outputs.type }}
          loaders: neoforge
          game-versions: ${{ steps.props.outputs.minecraft_version }}

{{/neoforge}}
      - name: Update Modrinth description
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -f MODPAGE.md ]; then
            BODY=$(jq -Rs . < MODPAGE.md)
            curl -s -X PATCH "https://api.modrinth.com/v2/project/{{modrinth_id}}" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\": $BODY}"
          fi
