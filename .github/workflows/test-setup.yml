name: Test CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd cli && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: mcmod
          path: cli/target/release/mcmod

  test-scaffold:
    needs: build-cli
    name: "scaffold: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language ${{ matrix.language }} \
            --loader fabric --loader neoforge \
            --minecraft 1.21.4 \
            --ci false --server false --publishing false \
            --testing false --offline

      - name: Verify gradle.properties
        run: |
          grep -q 'mod.id=testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.group=com.example.testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.name=Test Mod' /tmp/testmod/gradle.properties

      - name: Verify Stonecutter files exist
        run: |
          test -f /tmp/testmod/stonecutter.gradle.kts
          test -f /tmp/testmod/settings.gradle.kts
          test -f /tmp/testmod/build.gradle.kts
          test -f /tmp/testmod/versions/1.21.4/gradle.properties

      - name: Verify Fabric build file
        run: test -f /tmp/testmod/fabric/build.gradle.kts

      - name: Verify Kotlin-specific settings
        if: matrix.language == 'kotlin'
        run: |
          grep -q 'kotlin("jvm")' /tmp/testmod/build.gradle.kts
          test ! -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"

      - name: Verify common source in root src/
        run: |
          if [ "${{ matrix.language }}" = "kotlin" ]; then
            test -f "/tmp/testmod/src/main/kotlin/com/example/testmod/TestmodMod.kt"
          else
            test -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"
          fi

      - name: Verify assets renamed
        run: test -d "/tmp/testmod/src/main/resources/assets/testmod"

      - name: Verify mod metadata exists
        run: |
          test -f /tmp/testmod/fabric/src/main/resources/fabric.mod.json
          test -f /tmp/testmod/neoforge/src/main/resources/META-INF/neoforge.mods.toml

      - name: Verify per-version deps
        run: |
          grep -q 'deps.fabric_api=' /tmp/testmod/versions/1.21.4/gradle.properties
          grep -q 'deps.neoforge=' /tmp/testmod/versions/1.21.4/gradle.properties
          grep -q 'deps.mc_dep_fabric=' /tmp/testmod/versions/1.21.4/gradle.properties

      - name: Verify no .github dir (CI disabled)
        run: test ! -d /tmp/testmod/.github

  test-ci-enabled:
    needs: build-cli
    name: "CI-enabled: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init with CI
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language ${{ matrix.language }} \
            --loader fabric --loader neoforge \
            --minecraft 1.21.4 \
            --ci true --server false --publishing false \
            --testing false --offline

      - name: Verify build.yml exists
        run: test -f /tmp/testmod/.github/workflows/build.yml

      - name: Verify gradle.properties
        run: |
          grep -q 'mod.id=testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.group=com.example.testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.name=Test Mod' /tmp/testmod/gradle.properties

      - name: Verify Stonecutter files exist
        run: |
          test -f /tmp/testmod/stonecutter.gradle.kts
          test -f /tmp/testmod/settings.gradle.kts
          test -f /tmp/testmod/build.gradle.kts

      - name: Verify Fabric build file
        run: test -f /tmp/testmod/fabric/build.gradle.kts

      - name: Verify Kotlin-specific settings
        if: matrix.language == 'kotlin'
        run: |
          grep -q 'kotlin("jvm")' /tmp/testmod/build.gradle.kts
          test ! -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"

      - name: Verify common source in root src/
        run: |
          if [ "${{ matrix.language }}" = "kotlin" ]; then
            test -f "/tmp/testmod/src/main/kotlin/com/example/testmod/TestmodMod.kt"
          else
            test -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"
          fi

  test-multi-version:
    needs: build-cli
    name: "multi-version"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init with multiple versions
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language java \
            --loader fabric --loader neoforge \
            --minecraft 1.21.1 --minecraft 1.21.7 \
            --ci false --server false --publishing false \
            --testing false --offline

      - name: Verify version directories
        run: |
          test -f /tmp/testmod/versions/1.21.1/gradle.properties
          test -f /tmp/testmod/versions/1.21.7/gradle.properties

      - name: Verify version ranges
        run: |
          grep -q 'deps.mc_dep_fabric=>=1.21.1 <=1.21.6' /tmp/testmod/versions/1.21.1/gradle.properties
          grep -q 'deps.mc_dep_fabric=>=1.21.7 <=1.21.11' /tmp/testmod/versions/1.21.7/gradle.properties

      - name: Verify Stonecutter versions in settings
        run: |
          grep -q '"1.21.1", "1.21.7"' /tmp/testmod/settings.gradle.kts

      - name: Verify active version
        run: |
          grep -q 'stonecutter active "1.21.1"' /tmp/testmod/stonecutter.gradle.kts
