name: Test CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd cli && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: mcmod
          path: cli/target/release/mcmod

  test-scaffold:
    needs: build-cli
    name: "scaffold: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language ${{ matrix.language }} \
            --loader fabric --loader neoforge \
            --ci false --server false --publishing false \
            --testing false --offline

      - name: Verify gradle.properties
        run: |
          grep -q 'archives_base_name=testmod' /tmp/testmod/gradle.properties
          grep -q 'maven_group=com.example.testmod' /tmp/testmod/gradle.properties
          grep -q 'mod_name=Test Mod' /tmp/testmod/gradle.properties

      - name: Verify Fabric API enabled
        run: grep -q '^[^/]*modApi "net.fabricmc.fabric-api:fabric-api' /tmp/testmod/fabric/build.gradle

      - name: Verify Kotlin-specific settings
        if: matrix.language == 'kotlin'
        run: |
          grep -q 'mod_language=kotlin' /tmp/testmod/gradle.properties
          grep -q '^kotlin_version=' /tmp/testmod/gradle.properties
          test ! -f "/tmp/testmod/common/src/main/java/com/example/testmod/TestmodMod.java"

      - name: Verify common assets renamed
        run: test -d "/tmp/testmod/common/src/main/resources/assets/testmod"

      - name: Normalize versions in generated metadata
        run: |
          chmod +x test/normalize-versions.sh
          bash test/normalize-versions.sh /tmp/testmod/fabric/src/main/resources/fabric.mod.json
          bash test/normalize-versions.sh /tmp/testmod/neoforge/src/main/resources/META-INF/neoforge.mods.toml

      - name: Diff against golden files
        run: |
          LANG="${{ matrix.language }}"
          GOLDEN="test/golden/$LANG"
          FAIL=0

          diff_file() {
            if [ ! -f "$1" ]; then
              echo "::error::MISSING: $1"
              return 1
            fi
            if ! diff -u "$2" "$1"; then
              echo "::error::MISMATCH: $1 vs $2"
              return 1
            fi
          }

          if [ "$LANG" = "java" ]; then
            diff_file "/tmp/testmod/common/src/main/java/com/example/testmod/TestmodMod.java" \
                       "$GOLDEN/common/src/main/java/com/example/testmod/TestmodMod.java" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/java/com/example/testmod/fabric/TestmodModFabric.java" \
                       "$GOLDEN/fabric/src/main/java/com/example/testmod/fabric/TestmodModFabric.java" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/java/com/example/testmod/mixin/package-info.java" \
                       "$GOLDEN/fabric/src/main/java/com/example/testmod/mixin/package-info.java" || FAIL=1
            diff_file "/tmp/testmod/neoforge/src/main/java/com/example/testmod/neoforge/TestmodModNeoForge.java" \
                       "$GOLDEN/neoforge/src/main/java/com/example/testmod/neoforge/TestmodModNeoForge.java" || FAIL=1
          else
            diff_file "/tmp/testmod/common/src/main/kotlin/com/example/testmod/TestmodMod.kt" \
                       "$GOLDEN/common/src/main/kotlin/com/example/testmod/TestmodMod.kt" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/kotlin/com/example/testmod/fabric/TestmodModFabric.kt" \
                       "$GOLDEN/fabric/src/main/kotlin/com/example/testmod/fabric/TestmodModFabric.kt" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/java/com/example/testmod/mixin/package-info.java" \
                       "$GOLDEN/fabric/src/main/java/com/example/testmod/mixin/package-info.java" || FAIL=1
            diff_file "/tmp/testmod/neoforge/src/main/kotlin/com/example/testmod/neoforge/TestmodModNeoForge.kt" \
                       "$GOLDEN/neoforge/src/main/kotlin/com/example/testmod/neoforge/TestmodModNeoForge.kt" || FAIL=1
          fi

          diff_file "/tmp/testmod/fabric/src/main/resources/fabric.mod.json" \
                     "$GOLDEN/fabric/src/main/resources/fabric.mod.json" || FAIL=1
          diff_file "/tmp/testmod/fabric/src/main/resources/testmod.mixins.json" \
                     "$GOLDEN/fabric/src/main/resources/testmod.mixins.json" || FAIL=1
          diff_file "/tmp/testmod/neoforge/src/main/resources/META-INF/neoforge.mods.toml" \
                     "$GOLDEN/neoforge/src/main/resources/META-INF/neoforge.mods.toml" || FAIL=1
          diff_file "/tmp/testmod/settings.gradle" \
                     "$GOLDEN/settings.gradle" || FAIL=1

          [ "$FAIL" -eq 0 ] || exit 1
          echo "All golden file comparisons passed."

      - name: Verify no .github dir (CI disabled)
        run: test ! -d /tmp/testmod/.github

  test-ci-enabled:
    needs: build-cli
    name: "CI-enabled: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init with CI
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language ${{ matrix.language }} \
            --loader fabric --loader neoforge \
            --ci true --server false --publishing false \
            --testing false --offline

      - name: Verify build.yml exists
        run: test -f /tmp/testmod/.github/workflows/build.yml

      - name: Verify gradle.properties
        run: |
          grep -q 'archives_base_name=testmod' /tmp/testmod/gradle.properties
          grep -q 'maven_group=com.example.testmod' /tmp/testmod/gradle.properties
          grep -q 'mod_name=Test Mod' /tmp/testmod/gradle.properties

      - name: Verify Fabric API enabled
        run: grep -q '^[^/]*modApi "net.fabricmc.fabric-api:fabric-api' /tmp/testmod/fabric/build.gradle

      - name: Verify Kotlin-specific settings
        if: matrix.language == 'kotlin'
        run: |
          grep -q 'mod_language=kotlin' /tmp/testmod/gradle.properties
          grep -q '^kotlin_version=' /tmp/testmod/gradle.properties
          test ! -f "/tmp/testmod/common/src/main/java/com/example/testmod/TestmodMod.java"

      - name: Verify common assets renamed
        run: test -d "/tmp/testmod/common/src/main/resources/assets/testmod"

      - name: Normalize versions in generated metadata
        run: |
          chmod +x test/normalize-versions.sh
          bash test/normalize-versions.sh /tmp/testmod/fabric/src/main/resources/fabric.mod.json
          bash test/normalize-versions.sh /tmp/testmod/neoforge/src/main/resources/META-INF/neoforge.mods.toml

      - name: Diff against golden files
        run: |
          LANG="${{ matrix.language }}"
          GOLDEN="test/golden/$LANG"
          CI_GOLDEN="test/golden/ci"
          FAIL=0

          diff_file() {
            if [ ! -f "$1" ]; then
              echo "::error::MISSING: $1"
              return 1
            fi
            if ! diff -u "$2" "$1"; then
              echo "::error::MISMATCH: $1 vs $2"
              return 1
            fi
          }

          if [ "$LANG" = "java" ]; then
            diff_file "/tmp/testmod/common/src/main/java/com/example/testmod/TestmodMod.java" \
                       "$GOLDEN/common/src/main/java/com/example/testmod/TestmodMod.java" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/java/com/example/testmod/fabric/TestmodModFabric.java" \
                       "$GOLDEN/fabric/src/main/java/com/example/testmod/fabric/TestmodModFabric.java" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/java/com/example/testmod/mixin/package-info.java" \
                       "$GOLDEN/fabric/src/main/java/com/example/testmod/mixin/package-info.java" || FAIL=1
            diff_file "/tmp/testmod/neoforge/src/main/java/com/example/testmod/neoforge/TestmodModNeoForge.java" \
                       "$GOLDEN/neoforge/src/main/java/com/example/testmod/neoforge/TestmodModNeoForge.java" || FAIL=1
          else
            diff_file "/tmp/testmod/common/src/main/kotlin/com/example/testmod/TestmodMod.kt" \
                       "$GOLDEN/common/src/main/kotlin/com/example/testmod/TestmodMod.kt" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/kotlin/com/example/testmod/fabric/TestmodModFabric.kt" \
                       "$GOLDEN/fabric/src/main/kotlin/com/example/testmod/fabric/TestmodModFabric.kt" || FAIL=1
            diff_file "/tmp/testmod/fabric/src/main/java/com/example/testmod/mixin/package-info.java" \
                       "$GOLDEN/fabric/src/main/java/com/example/testmod/mixin/package-info.java" || FAIL=1
            diff_file "/tmp/testmod/neoforge/src/main/kotlin/com/example/testmod/neoforge/TestmodModNeoForge.kt" \
                       "$GOLDEN/neoforge/src/main/kotlin/com/example/testmod/neoforge/TestmodModNeoForge.kt" || FAIL=1
          fi

          diff_file "/tmp/testmod/fabric/src/main/resources/fabric.mod.json" \
                     "$GOLDEN/fabric/src/main/resources/fabric.mod.json" || FAIL=1
          diff_file "/tmp/testmod/fabric/src/main/resources/testmod.mixins.json" \
                     "$GOLDEN/fabric/src/main/resources/testmod.mixins.json" || FAIL=1
          diff_file "/tmp/testmod/neoforge/src/main/resources/META-INF/neoforge.mods.toml" \
                     "$GOLDEN/neoforge/src/main/resources/META-INF/neoforge.mods.toml" || FAIL=1
          diff_file "/tmp/testmod/settings.gradle" \
                     "$GOLDEN/settings.gradle" || FAIL=1

          diff_file "/tmp/testmod/.github/workflows/build.yml" \
                     "$CI_GOLDEN/build.yml" || FAIL=1

          [ "$FAIL" -eq 0 ] || exit 1
          echo "All golden file comparisons passed."
