name: Test CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd cli && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: mcmod
          path: cli/target/release/mcmod

  test-scaffold:
    needs: build-cli
    name: "scaffold: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language ${{ matrix.language }} \
            --loader fabric --loader neoforge \
            --minecraft 1.21.4 \
            --ci false --server false --publishing false \
            --testing false

      - name: Verify gradle.properties
        run: |
          grep -q 'mod.id=testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.group=com.example.testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.name=Test Mod' /tmp/testmod/gradle.properties

      - name: Verify Stonecutter files exist
        run: |
          test -f /tmp/testmod/stonecutter.gradle.kts
          test -f /tmp/testmod/settings.gradle.kts
          test -f /tmp/testmod/build.gradle.kts
          test -f /tmp/testmod/versions/dependencies/1.21.4.properties

      - name: Verify Stonecraft in build.gradle.kts
        run: grep -q 'gg.meza.stonecraft' /tmp/testmod/build.gradle.kts

      - name: Verify no fabric/ or neoforge/ subdirectories
        run: |
          test ! -d /tmp/testmod/fabric
          test ! -d /tmp/testmod/neoforge

      - name: Verify Kotlin-specific settings
        if: matrix.language == 'kotlin'
        run: |
          grep -q 'kotlin("jvm")' /tmp/testmod/build.gradle.kts
          test ! -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"

      - name: Verify unified source in root src/
        run: |
          if [ "${{ matrix.language }}" = "kotlin" ]; then
            test -f "/tmp/testmod/src/main/kotlin/com/example/testmod/TestmodMod.kt"
          else
            test -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"
          fi

      - name: Verify assets exist
        run: test -d "/tmp/testmod/src/main/resources/assets/testmod"

      - name: Verify mod metadata in unified src/main/resources/
        run: |
          test -f /tmp/testmod/src/main/resources/fabric.mod.json
          test -f /tmp/testmod/src/main/resources/META-INF/neoforge.mods.toml
          test -f /tmp/testmod/src/main/resources/testmod.mixins.json

      - name: Verify per-version deps
        run: |
          grep -q 'fabric_version=' /tmp/testmod/versions/dependencies/1.21.4.properties
          grep -q 'neoforge_version=' /tmp/testmod/versions/dependencies/1.21.4.properties
          grep -q 'minecraft_version=1.21.4' /tmp/testmod/versions/dependencies/1.21.4.properties

      - name: Verify no .github dir (CI disabled)
        run: test ! -d /tmp/testmod/.github

  test-ci-enabled:
    needs: build-cli
    name: "CI-enabled: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init with CI
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language ${{ matrix.language }} \
            --loader fabric --loader neoforge \
            --minecraft 1.21.4 \
            --ci true --server false --publishing false \
            --testing false

      - name: Verify build.yml exists
        run: test -f /tmp/testmod/.github/workflows/build.yml

      - name: Verify gradle.properties
        run: |
          grep -q 'mod.id=testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.group=com.example.testmod' /tmp/testmod/gradle.properties
          grep -q 'mod.name=Test Mod' /tmp/testmod/gradle.properties

      - name: Verify Stonecraft setup
        run: |
          test -f /tmp/testmod/stonecutter.gradle.kts
          test -f /tmp/testmod/settings.gradle.kts
          test -f /tmp/testmod/build.gradle.kts
          grep -q 'gg.meza.stonecraft' /tmp/testmod/build.gradle.kts

      - name: Verify Kotlin-specific settings
        if: matrix.language == 'kotlin'
        run: |
          grep -q 'kotlin("jvm")' /tmp/testmod/build.gradle.kts
          test ! -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"

      - name: Verify unified source in root src/
        run: |
          if [ "${{ matrix.language }}" = "kotlin" ]; then
            test -f "/tmp/testmod/src/main/kotlin/com/example/testmod/TestmodMod.kt"
          else
            test -f "/tmp/testmod/src/main/java/com/example/testmod/TestmodMod.java"
          fi

  test-multi-version:
    needs: build-cli
    name: "multi-version"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcmod
      - run: chmod +x mcmod

      - name: Run mcmod init with multiple versions
        run: |
          mkdir /tmp/testmod
          ./mcmod init --dir /tmp/testmod \
            --mod-id testmod --mod-name "Test Mod" \
            --package com.example.testmod --author TestAuthor \
            --description "A test mod" --language java \
            --loader fabric --loader neoforge \
            --minecraft 1.21.1 --minecraft 1.21.7 \
            --ci false --server false --publishing false \
            --testing false

      - name: Verify version properties files
        run: |
          test -f /tmp/testmod/versions/dependencies/1.21.1.properties
          test -f /tmp/testmod/versions/dependencies/1.21.7.properties

      - name: Verify version properties content
        run: |
          grep -q 'minecraft_version=1.21.1' /tmp/testmod/versions/dependencies/1.21.1.properties
          grep -q 'minecraft_version=1.21.7' /tmp/testmod/versions/dependencies/1.21.7.properties

      - name: Verify Stonecutter mc() calls in settings
        run: |
          grep -q 'mc("1.21.1"' /tmp/testmod/settings.gradle.kts
          grep -q 'mc("1.21.7"' /tmp/testmod/settings.gradle.kts

      - name: Verify active version includes loader suffix
        run: |
          grep -q 'stonecutter active "1.21.1-fabric"' /tmp/testmod/stonecutter.gradle.kts
